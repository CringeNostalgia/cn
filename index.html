  let { w: logoW, h: logoH } = getSize();
  let x = Math.random() * Math.max(0, window.innerWidth - logoW);
  let y = Math.random() * Math.max(0, window.innerHeight - logoH);
  const SPEED = 0.3;
  let vx = SPEED;
  let vy = SPEED;

  function refreshSize() {
    const { w, h } = getSize();
    logoW = w;
    logoH = h;
    x = Math.min(x, Math.max(0, window.innerWidth - logoW));
    y = Math.min(y, Math.max(0, window.innerHeight - logoH));
  }
  if (logo.complete) refreshSize();
  else logo.addEventListener('load', refreshSize);

  function tick() {
    const maxX = window.innerWidth - logoW;
    const maxY = window.innerHeight - logoH;

    x += vx;
    y += vy;

    if (x <= 0) { x = 0; vx = Math.abs(vx); }
    else if (x >= maxX) { x = maxX; vx = -Math.abs(vx); }

    if (y <= 0) { y = 0; vy = Math.abs(vy); }
    else if (y >= maxY) { y = maxY; vy = -Math.abs(vy); }

    logo.style.transform = `translate(${x}px, ${y}px)`;
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

  window.addEventListener('resize', refreshSize);
})();
</script>
</body>
</html>
